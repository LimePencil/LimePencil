name: Generate TUI Profile Widget

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Generate PNG
        run: node index.js
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      - name: Commit changes
        run: |
          git config --local user.email "71117066+LimePencil@users.noreply.github.com"
          git config --local user.name "LimePencil"
          git add tui-profile.png
          git commit -m "chore: Update TUI profile widget" || exit 0
          git push
